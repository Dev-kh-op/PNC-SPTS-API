$kind: http-request
name: Forgot Password
method: POST
url: "{{baseUrl}}/auth/forgot-password"
description: Request a password reset email. Public endpoint.
auth:
  type: noauth
order: 6000
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "email": "superadmin@example.com"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 200', function () {
        pm.response.to.have.status(200);
      });

      pm.test('Response envelope is valid', function () {
        const json = pm.response.json();
        pm.expect(json).to.have.property('statusCode', 200);
        pm.expect(json).to.have.property('success', true);
        pm.expect(json).to.have.property('timestamp');
      });

      pm.test('Response time is under 3000ms', function () {
        pm.expect(pm.response.responseTime).to.be.below(3000);
      });
    language: text/javascript
