$kind: http-request
name: Create Follow-Up Case
method: POST
url: '{{baseUrl}}/follow-up/cases'
description: 'Create a new follow-up case for a student. Requires authentication and appropriate permissions.'
order: 1000
headers:
  - key: Content-Type
    value: application/json
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
body:
  type: json
  content: |-
    {
      "studentId": "{{studentId}}",
      "openedByTeacherId": "{{teacherId}}",
      "termId": "{{termId}}",
      "title": "Academic Performance Issue",
      "description": "Student has been struggling with math assignments for the past two weeks.",
      "priority": "medium",
      "status": "OPEN",
      "openedDate": "2026-06-04"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status code is 201', function () {
        pm.response.to.have.status(201);
      });

      pm.test('Response envelope is valid', function () {
        const json = pm.response.json();
        pm.expect(json).to.have.property('statusCode', 201);
        pm.expect(json).to.have.property('success', true);
        pm.expect(json).to.have.property('data');
        pm.expect(json).to.have.property('timestamp');
      });

      pm.test('Created follow-up case has required fields', function () {
        const data = pm.response.json().data;
        pm.expect(data).to.have.property('id');
        pm.expect(data).to.have.property('title');
        pm.expect(data).to.have.property('status');
        pm.expect(data).to.have.property('priority');
        pm.expect(data).to.have.property('studentId');
      });

      pm.test('Status is OPEN by default', function () {
        const data = pm.response.json().data;
        pm.expect(data.status).to.equal('OPEN');
      });

      pm.test('Response time is under 3000ms', function () {
        pm.expect(pm.response.responseTime).to.be.below(3000);
      });

      // Save follow-up case ID for subsequent requests
      if (pm.response.code === 201) {
        const data = pm.response.json().data;
        if (data && data.id) {
          pm.collectionVariables.set('followUpCaseId', data.id);
        }
      }
