$kind: http-request
name: Update Student
method: PATCH
url: '{{baseUrl}}/students/{{studentId}}'
description: Update an existing student record by ID.
order: 4000
headers:
  - key: Content-Type
    value: application/json
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
body:
  type: json
  content: |-
    {
      "firstName": "Sophea Updated",
      "phone": "098765432",
      "status": "active"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status code is 200', function () {
        pm.response.to.have.status(200);
      });

      pm.test('Response envelope is valid', function () {
        const json = pm.response.json();
        pm.expect(json).to.have.property('statusCode', 200);
        pm.expect(json).to.have.property('success', true);
        pm.expect(json).to.have.property('data');
        pm.expect(json).to.have.property('timestamp');
      });

      pm.test('Updated student has required fields', function () {
        const data = pm.response.json().data;
        pm.expect(data).to.have.property('id');
        pm.expect(data).to.have.property('studentCode');
        pm.expect(data).to.have.property('firstName');
      });

      pm.test('Response time is under 3000ms', function () {
        pm.expect(pm.response.responseTime).to.be.below(3000);
      });
