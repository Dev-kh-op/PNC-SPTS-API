$kind: http-request
name: Update User
method: PATCH
url: '{{baseUrl}}/users/:id'
description: 'Update a user''s basic info (first_name, last_name, phone). Requires SUPER_ADMIN or ADMIN role with user.update permission.'
order: 5000
headers:
  - key: Content-Type
    value: application/json
pathVariables:
  - key: id
    value: 'user-id-here'
    description: The user's UUID
body:
  type: json
  content: |-
    {
      "first_name": "Jane",
      "last_name": "Smith",
      "phone": "+0987654321"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status code is 200', function () {
        pm.response.to.have.status(200);
      });

      pm.test('Response envelope is valid', function () {
        const json = pm.response.json();
        pm.expect(json).to.have.property('statusCode', 200);
        pm.expect(json).to.have.property('success', true);
        pm.expect(json).to.have.property('data');
        pm.expect(json).to.have.property('timestamp');
      });

      pm.test('Updated user has required fields', function () {
        const data = pm.response.json().data;
        pm.expect(data).to.have.property('id');
        pm.expect(data).to.have.property('email');
      });

      pm.test('Response time is under 3000ms', function () {
        pm.expect(pm.response.responseTime).to.be.below(3000);
      });
