$kind: http-request
name: Get User by ID
method: GET
url: '{{baseUrl}}/users/:id'
description: Get a single user by their ID. Requires SUPER_ADMIN or ADMIN role with user.read permission.
order: 4000
pathVariables:
  - key: id
    value: 'user-id-here'
    description: The user's UUID
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status code is 200', function () {
        pm.response.to.have.status(200);
      });

      pm.test('Response envelope is valid', function () {
        const json = pm.response.json();
        pm.expect(json).to.have.property('statusCode', 200);
        pm.expect(json).to.have.property('success', true);
        pm.expect(json).to.have.property('data');
        pm.expect(json).to.have.property('timestamp');
      });

      pm.test('User has required fields', function () {
        const data = pm.response.json().data;
        pm.expect(data).to.have.property('id');
        pm.expect(data).to.have.property('email');
        pm.expect(data).to.have.property('first_name');
        pm.expect(data).to.have.property('last_name');
      });

      pm.test('User does not expose password', function () {
        const data = pm.response.json().data;
        pm.expect(data).to.not.have.property('password');
        pm.expect(data).to.not.have.property('password_hash');
      });

      pm.test('Response time is under 3000ms', function () {
        pm.expect(pm.response.responseTime).to.be.below(3000);
      });
