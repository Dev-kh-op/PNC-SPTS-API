$kind: http-request
name: Get My Profile
method: GET
url: '{{baseUrl}}/users/profile'
description: Get the currently authenticated user's profile. Available to any authenticated user.
order: 3000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status code is 200', function () {
        pm.response.to.have.status(200);
      });

      pm.test('Response envelope is valid', function () {
        const json = pm.response.json();
        pm.expect(json).to.have.property('statusCode', 200);
        pm.expect(json).to.have.property('success', true);
        pm.expect(json).to.have.property('data');
        pm.expect(json).to.have.property('timestamp');
      });

      pm.test('Profile has required fields', function () {
        const data = pm.response.json().data;
        pm.expect(data).to.have.property('user_id');
        pm.expect(data).to.have.property('email');
      });

      pm.test('Profile does not expose password', function () {
        const data = pm.response.json().data;
        pm.expect(data).to.not.have.property('password');
        pm.expect(data).to.not.have.property('password_hash');
      });

      pm.test('Response time is under 3000ms', function () {
        pm.expect(pm.response.responseTime).to.be.below(3000);
      });
